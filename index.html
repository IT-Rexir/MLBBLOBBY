<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lobby Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0f1a;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  background:linear-gradient(90deg,#0ea5e9,#9333ea);
  font-weight:bold;
}

.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

input,textarea,select{
  width:90%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  background:#0b0f1a;
  color:white;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#0ea5e9,#9333ea);
  color:white;
  font-weight:bold;
}

#nameBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lobby{
  background:#101726;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

.rank{
  background:#9333ea;
  display:inline-block;
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
}

.id-box{
  margin-top:5px;
  display:inline-block;
  padding:5px 8px;
  border-radius:8px;
  background:#0b0f1a;
  border:1px solid #9333ea;
  font-size:12px;
  cursor:pointer;
}

.chat-panel{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:45%;
  background:#0b0f1a;
  border-top:2px solid #9333ea;
  flex-direction:column;
  z-index:999;
}

.chat-header{
  padding:10px;
  background:#141a2b;
  display:flex;
  justify-content:space-between;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:10px;
  font-size:13px;
}

.chat-input{
  display:flex;
  gap:5px;
  padding:10px;
  background:#141a2b;
}

.chat-input input{
  flex:3;
}

.chat-input button{
  flex:1;
}

.scan-btn{
  width:90%;
  margin:10px auto;
  display:block;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="header">
 Lobby Finder
<br>
<small id="lobbyCount">Open Lobbies: 0</small>
</div>

<div id="nameBox">
  <div>
    <h3>Enter Your Username</h3>
    <input id="usernameInput" placeholder="Your name">
    <button onclick="setName()">Continue</button>
  </div>
</div>

<div class="container">

<h3>Create Lobby</h3>

<input id="name" placeholder="Lobby Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="number" id="lobbyId" placeholder="Lobby ID">

<select id="rank">
  <option>Warrior–Elite</option>
  <option>Elite–Master</option>
  <option>Master–Grandmaster</option>
  <option>Grandmaster–Epic</option>
  <option>Epic–Legend</option>
  <option>Legend–Mythic</option>
  <option>Mythic–Glory</option>
</select>

<select id="maxPlayers">
  <option value="5">5 Players Available</option>
  <option value="4">4 Players Available</option>
  <option value="3">3 Players Available</option>
  <option value="2">2 Players Available</option>
  <option value="1">1 Players Available</option>
</select>

<button onclick="createLobby()">Create Lobby</button>

<button class="scan-btn" onclick="scanLobbies()">🔍 Scan Active Lobbies</button>

<div id="lobbies"></div>

</div>

<div class="chat-panel" id="chatPanel">

  <div class="chat-header">
    <span>💬 Lobby Chat</span>
    <button onclick="closeChat()">X</button>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="chat-input">
    <input id="chatMsg" placeholder="Type message...">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDPuUBqDi3t68v9HKnfF512RPNB0Bg38Vs",
  authDomain: "messageapp-b2d5a.firebaseapp.com",
  projectId: "messageapp-b2d5a",
  storageBucket: "messageapp-b2d5a.firebasestorage.app",
  messagingSenderId: "446587723082",
  appId: "1:446587723082:android:89814fa91f7fa2ed0ef5b3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let username = "";
let currentLobby = "";
let lobbyListener = null;

/* USERNAME */
function setName(){
  const val = document.getElementById("usernameInput").value;
  if(!val) return;

  username = val;
  document.getElementById("nameBox").style.display = "none";
}

/* CREATE LOBBY (FIXED) */
function createLobby(){

  const nameEl = document.getElementById("name");
  const descEl = document.getElementById("desc");
  const idEl = document.getElementById("lobbyId");
  const rankEl = document.getElementById("rank");
  const maxEl = document.getElementById("maxPlayers");

  const name = nameEl ? nameEl.value.trim() : "";
  const desc = descEl ? descEl.value.trim() : "";
  const lobbyId = idEl ? idEl.value.trim() : "";
  const rank = rankEl ? rankEl.value : "";
  const maxPlayers = maxEl ? maxEl.value : "";

  // 🔥 DEBUG ALERT (IMPORTANT)
  console.log("CREATE LOBBY:", { name, desc, lobbyId, rank, maxPlayers });

  if(!name || !lobbyId){
    alert("❌ Fill Lobby Name and Lobby ID first");
    return;
  }

  db.collection("lobbies").add({
    name,
    desc: desc || "No description",
    lobbyId,
    rank,
    maxPlayers,
    players: 5,
    createdAt: Date.now()
  })
  .then(()=>{
    alert("✅ Lobby Created!");
  })
  .catch(err=>{
    alert("❌ Error: " + err.message);
  });
}

/* SCAN FIXED */
function loadLobbies(){

  if(lobbyListener){
    lobbyListener(); // remove old listener
  }

  lobbyListener = db.collection("lobbies")
  .orderBy("createdAt","desc")
  .onSnapshot(snap=>{

    const container = document.getElementById("lobbies");

    let html = "";
    let count = 0;

    snap.forEach(d=>{
      const l = d.data();
      if(!l) return;

      count++;

      html += `
      <div class="lobby">

        <b>${l.name}</b><br>

        <div style="margin:5px 0;font-size:12px;">
          ${l.desc}
        </div>

        <div class="rank">🏆 ${l.rank}</div><br>

        👥 ${l.maxPlayers}/${l.players}<br>

        <div class="id-box" onclick="copyID('${l.lobbyId}')">
          🆔 ${l.lobbyId}
        </div><br>

        <button onclick="openChat('${d.id}')">Chat</button>

      </div>`;
    });

    container.innerHTML = html;
    document.getElementById("lobbyCount").innerText =
      "Open Lobbies: " + count;
  });
}

function scanLobbies(){
  loadLobbies();
}

/* CHAT FIXED */
function copyID(id){
  navigator.clipboard.writeText(id);
}

function openChat(id){
  currentLobby = id;
  document.getElementById("chatPanel").style.display = "flex";

  db.collection("lobbies").doc(id).collection("chat")
  .orderBy("time")
  .onSnapshot(snap=>{
    let html = "";

    snap.forEach(m=>{
      const d = m.data();

      const time = d.time
        ? new Date(d.time).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
          })
        : "";

      html += `
      <div>
        <b style="color:#0ea5e9">${d.user}</b>
        <small> • ${time}</small><br>
        ${d.msg}
      </div>`;
    });

    document.getElementById("chatBox").innerHTML = html;
  });
}

function closeChat(){
  document.getElementById("chatPanel").style.display = "none";
}

function sendMsg(){
  const msg = document.getElementById("chatMsg").value;
  if(!msg) return;

  document.getElementById("chatMsg").value = "";

  db.collection("lobbies").doc(currentLobby)
  .collection("chat").add({
    user: username,
    msg,
    time: Date.now()
  });
}

loadLobbies();
</script>

</body>
</html>
